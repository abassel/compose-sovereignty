# Run this docker individually

# Test variables/configuration
# ADMIN_USER_GLOBAL=<USERNAME> ADMIN_PASS_GLOBAL=<PASSWORD> docker-compose config

# Up
# ADMIN_USER_GLOBAL=<USERNAME> ADMIN_PASS_GLOBAL=<PASSWORD> docker-compose up  -d  --build   # Run in detached mode

services:

  mongo:
    image: mongo:6.0.4-focal
    container_name: mongodb
    # ports:
    #   - "27017:27017"
    restart: always
    volumes:
      - ${APP_DATA_DIR}/mongodb:/data/db
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${ADMIN_USER_GLOBAL}
      - MONGO_INITDB_ROOT_PASSWORD=${ADMIN_PASS_GLOBAL}
    networks:
      - no_internet
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.mongo.entrypoints=mongo"
      - "traefik.tcp.routers.mongo.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.mongo.service=mongo-tcp-svc"
      - "traefik.tcp.services.mongo-tcp-svc.loadbalancer.server.port=27017"

  mongoman:
    image: ghcr.io/aientech/mongoman:0.2.1
    container_name: mongoman
    restart: always
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://${ADMIN_USER_GLOBAL}:${ADMIN_PASS_GLOBAL}@mongodb:27017
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - no_internet
    labels:
      - "homepage.group=Services"
      - "homepage.name=MongoMan"
      - "homepage.icon=mongodb.png"
      - "homepage.href=$HTTP_SCHEMA://mongoman.$DOMAINNAME/"
      - "homepage.description=MongoDB admin interface"

      - "traefik.enable=true"
      - "traefik.http.routers.mongoman.service=mongoman"
      - "traefik.http.routers.mongoman.rule=Host(`mongoman.$DOMAINNAME`)"
      - "traefik.http.services.mongoman.loadbalancer.server.port=3000"
